openapi: '3.0.2'
info:
  title: Uranos API Documentation
  version: 'v1.0.0'
servers:
  - url: "http://localhost:8080"
    description: "Local server"
tags:
  - name: "startGame"
    description: "Start a new game."
  - name: "inGame"
    description: "In game actions."
  - name: "endGame"
    description: "End a game."
  - name: "aircraft"
    description: "Aircraft location and status information."
paths:
  "/startGame":
    post:
      tags: ["startGame"]
      summary: "Start a new game."
      description: "Sent only once when the game starts."
      deprecated: false
      requestBody:
        description: "Initial value of airspace. The initial value is sent from the front desk. To be able to read scenario files."
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required: ["areaInfo"]
              properties:
                areaInfo:
                  type: "array"
                  description: "Initial value of airspace."
                  items:
                    $ref: "#/components/schemas/Flight"

      responses:
        "200":
          description: "Game started."

        "400":
          description: "Bad request."
          content:
            application/json:
              schema:
                type: "object"
                example:
                  message: Bad request
                  details: Error message indicating which property is missing.
                properties:
                  message:
                    type: string
                  details:
                    type: string

  "/aircraft/location/all":
    get:
      tags: ["aircraft"]
      summary: "Get all aircraft locations and status"
      description: "Returns detailed information for all aircraft including position, vector, instructed vector, and risk level in JSON format."
      deprecated: false
      responses:
        "200":
          description: "Aircraft location data retrieved successfully"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AircraftLocation"

  "/api/aircraft/spawn-with-flightplan":
    post:
      tags: ["aircraft"]
      summary: "Spawn aircraft with flight plan"
      description: "Creates a new aircraft with an initial position and flight plan for automatic navigation."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpawnWithFlightPlan"
      responses:
        "200":
          description: Aircraft spawned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  callsign:
                    type: string
                  message:
                    type: string
        "400":
          description: Bad request (e.g. aircraft already exists)

  "/api/aircraft/{callsign}/flightplan":
    get:
      tags: ["aircraft"]
      summary: "Get aircraft flight plan status"
      description: "Returns the current flight plan status including navigation mode and remaining waypoints."
      parameters:
        - name: callsign
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Flight plan status
          content:
            application/json:
              schema:
                type: object
                properties:
                  callsign:
                    type: string
                  navigationMode:
                    type: string
                  currentWaypointIndex:
                    type: integer
                  currentWaypoint:
                    type: string
                  remainingWaypoints:
                    type: array
                    items:
                      type: string
    post:
      tags: ["aircraft"]
      summary: "Assign flight plan to aircraft"
      description: "Assigns a flight plan to an existing aircraft."
      parameters:
        - name: callsign
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlightPlanDto"
      responses:
        "200":
          description: Flight plan assigned

  "/api/aircraft/{callsign}/direct-to":
    post:
      tags: ["aircraft"]
      summary: "Direct aircraft to fix"
      description: "Instructs the aircraft to fly direct to the specified fix. Optionally resume flight plan after reaching the fix."
      parameters:
        - name: callsign
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fixName]
              properties:
                fixName:
                  type: string
                resumeFlightPlan:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Direct to instruction applied

  "/api/aircraft/{callsign}/resume-navigation":
    post:
      tags: ["aircraft"]
      summary: "Resume own navigation"
      description: "Instructs the aircraft to resume flight plan navigation (resume own navigation)."
      parameters:
        - name: callsign
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resume navigation applied

  "/aircraft/location":
    get:
      tags: ["aircraft"]
      summary: "Get specific aircraft location and status"
      description: "Returns detailed information for a specific aircraft by callsign including risk level in JSON format."
      deprecated: false
      parameters:
        - name: callsign
          in: query
          required: true
          schema:
            type: string
          description: "The callsign of the aircraft to retrieve"
          example: "JAL512"
      responses:
        "200":
          description: "Aircraft location data retrieved successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AircraftLocation"
        "400":
          description: "Aircraft not found or bad request"
          content:
            text/plain:
              schema:
                type: string
                example: "Aircraft with callsign JAL512 does not exist."

  "/inGame":
    get:
      tags: ["inGame"]
      summary: "Get the current area infomation."
      description: "Get the current area infomation like air plane position, altitude, heading, etc."
      deprecated: false
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  gameState:
                    type: "array"
                    description: "Current state of the game."
                    items:
                      $ref: "#/components/schemas/Flight"

        "400":
          description: "Bad request."
          content:
            application/json:
              schema:
                type: "object"
                example:
                  message: Bad request
                  details: Error message indicating which property is missing.
                properties:
                  message:
                    type: string
                  details:
                    type: string
    post:
      tags: ["inGame"]
      summary: "Give instructions to the pilot."
      description: Update the altitude, heading, and/or speed of a specified aircraft using its callsign.
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - callsign
              properties:
                callsign:
                  type: string
                  description: The callsign of the aircraft to update.
                altitude:
                  type: integer
                  description: The new altitude for the aircraft in feet. Optional.
                heading:
                  type: integer
                  description: The new heading for the aircraft in degrees (0-360). Optional.
                gspeed:
                  type: integer
                  description: The new ground speed for the aircraft in knots. Optional.
              example:
                callsign: "AAL123"
                altitude: 30000
                heading: 180
                gspeed: 450
      responses:
        '200':
          description: Flight parameters updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Flight parameters updated successfully."
        '400':
          description: Invalid input or missing required fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid input or missing required fields."
        '404':
          description: Aircraft not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Aircraft not found."
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Server error."

components:
  schemas:
    AircraftLocation:
      type: object
      properties:
        callsign:
          type: string
        position:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            altitude:
              type: number
        vector:
          type: object
          properties:
            heading:
              type: number
            groundSpeed:
              type: number
            verticalSpeed:
              type: number
        instructedVector:
          type: object
          properties:
            heading:
              type: number
            groundSpeed:
              type: number
            altitude:
              type: number
        type:
          type: string
        model:
          type: string
        originIata:
          type: string
        originIcao:
          type: string
        destinationIata:
          type: string
        destinationIcao:
          type: string
        eta:
          type: string
        riskLevel:
          type: number
    Flight:
      type: "object"
      example:
        callsign: "AAL123"
        latitude: 35.553333
        longitude: 139.781113
        heading: 150
        altitude: 35000
        gspeed: 250
        vspeed: 340
        type: "B777"
        orig_iata: "HND"
        orig_icao: "RJTT"
        dest_iata: "LAX"
        dest_icao: "KLAX"
        eta: "2024-05-21T12:00:00Z"
      properties:
        callsign:
          type: "string"
          description: "Each airplane's callsign."
        latitude:
          type: "number"
          format: "float"
          description: "Each airplane's latitude."
        longitude:
          type: "number"
          format: "float"
          description: "Each airplane's longitude."
        heading:
          type: "integer"
          description: "True track (over ground) expressed in integer degrees as 0-360. Please note that 0 can in some cases mean unknown."
        altitude:
          type: integer
          description: Barometric pressure altitude above mean sea level (AMSL) reported at a standard atmospheric pressure (1013.25 hPa / 29.92 in. Hg.) expressed in feet.
        gspeed:
          type: integer
          description: Speed relative to the ground expressed in knots.
        vspeed:
          type: integer
          description: The rate at which the aircraft is ascending or descending in feet per minute.
        type:
          type: string
          nullable: true
          description: Aircraft ICAO type code.
        orig_iata:
          type: string
          example: ARN
          description: Origin airport IATA code
        orig_icao:
          type: string
          example: ESSA
          description: Origin airport ICAO code
        dest_iata:
          type: string
          example: ARN
          description: Destination airport IATA code
        dest_icao:
          type: string
          example: ESSA
          description: Destination airport ICAO code
        eta:
          type: string
          nullable: true
          description: Estimated time of arrival (ISO 8601 date format)

    SpawnWithFlightPlan:
      type: object
      required: [flightPlan, initialPosition]
      properties:
        flightPlan:
          $ref: "#/components/schemas/FlightPlanDto"
        initialPosition:
          $ref: "#/components/schemas/InitialPositionDto"

    FlightPlanDto:
      type: object
      required: [callsign, cruiseAltitude, cruiseSpeed]
      properties:
        callsign:
          type: string
        aircraftType:
          type: string
        departureAirport:
          type: string
        arrivalAirport:
          type: string
        cruiseAltitude:
          type: integer
        cruiseSpeed:
          type: integer
        route:
          type: array
          items:
            $ref: "#/components/schemas/FlightPlanWaypointDto"

    FlightPlanWaypointDto:
      type: object
      required: [fix]
      properties:
        fix:
          type: string
        altitude:
          type: integer
        constraint:
          type: string
          enum: [AT, AT_OR_ABOVE, AT_OR_BELOW, BETWEEN, NONE]
        speed:
          type: integer
        action:
          type: string
          enum: [CONTINUE, REMOVE_AIRCRAFT, HANDOFF]

    InitialPositionDto:
      type: object
      required: [latitude, longitude, altitude, heading, groundSpeed, verticalSpeed]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        altitude:
          type: integer
        heading:
          type: integer
        groundSpeed:
          type: integer
        verticalSpeed:
          type: integer

